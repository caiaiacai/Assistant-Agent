<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" width="860" height="620" font-family="'PingFang SC','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9f1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7b5ea7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4f8ef7" opacity="0.7"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b35" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="620" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">Assistant-Agent · 九层架构</text>
  <text x="430" y="58" text-anchor="middle" font-size="12" fill="#888">只有 L3 和 L9 调用 LLM，其余全是规则引擎</text>

  <!-- ── INPUT SOURCES ── -->
  <!-- WeChat -->
  <rect x="60" y="88" width="110" height="38" rx="8" fill="#1a1a2e" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="115" y="111" text-anchor="middle" font-size="13" fill="#ff9f1c">💬 微信</text>
  <!-- Desktop -->
  <rect x="190" y="88" width="110" height="38" rx="8" fill="#1a1a2e" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="245" y="111" text-anchor="middle" font-size="13" fill="#ff9f1c">🖥 桌面 UI</text>

  <!-- Arrow from inputs to L1 -->
  <line x1="115" y1="126" x2="195" y2="160" stroke="#4f8ef7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="245" y1="126" x2="215" y2="160" stroke="#4f8ef7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ── MAIN PIPELINE (left column) ── -->
  <!-- L1 -->
  <rect x="120" y="158" width="190" height="50" rx="10" fill="#1e2a3a" stroke="#4f8ef7" stroke-width="1.5"/>
  <rect x="120" y="158" width="5" height="50" rx="3" fill="url(#blueGrad)"/>
  <text x="143" y="179" font-size="10" fill="#4f8ef7" font-weight="600">L1</text>
  <text x="222" y="179" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">输入层</text>
  <text x="222" y="196" text-anchor="middle" font-size="10" fill="#8899aa">聚合多渠道消息，统一格式化</text>

  <!-- Arrow L1→L2 -->
  <line x1="215" y1="208" x2="215" y2="228" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L2 -->
  <rect x="120" y="226" width="190" height="50" rx="10" fill="#1e2a3a" stroke="#4f8ef7" stroke-width="1.5"/>
  <rect x="120" y="226" width="5" height="50" rx="3" fill="url(#blueGrad)"/>
  <text x="143" y="247" font-size="10" fill="#4f8ef7" font-weight="600">L2</text>
  <text x="222" y="247" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">缓冲层</text>
  <text x="222" y="264" text-anchor="middle" font-size="10" fill="#8899aa">20s 滑动窗口聚合碎片意图</text>

  <!-- Arrow L2→L3 -->
  <line x1="215" y1="276" x2="215" y2="296" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L3 — LLM badge -->
  <rect x="120" y="294" width="190" height="50" rx="10" fill="#1f2d1f" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
  <rect x="120" y="294" width="5" height="50" rx="3" fill="#22c55e"/>
  <text x="143" y="315" font-size="10" fill="#22c55e" font-weight="600">L3</text>
  <text x="222" y="315" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">意图层 ✦ LLM</text>
  <text x="222" y="332" text-anchor="middle" font-size="10" fill="#8899aa">识别意图 + 注入用户习惯</text>

  <!-- Arrow L3→L5 -->
  <line x1="215" y1="344" x2="215" y2="364" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L5 -->
  <rect x="120" y="362" width="190" height="50" rx="10" fill="#1e2a3a" stroke="#4f8ef7" stroke-width="1.5"/>
  <rect x="120" y="362" width="5" height="50" rx="3" fill="url(#blueGrad)"/>
  <text x="143" y="383" font-size="10" fill="#4f8ef7" font-weight="600">L5</text>
  <text x="222" y="383" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">技能库</text>
  <text x="222" y="400" text-anchor="middle" font-size="10" fill="#8899aa">匹配历史成功路径，复用模板</text>

  <!-- Arrow L5→L6 -->
  <line x1="215" y1="412" x2="215" y2="432" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L6 -->
  <rect x="120" y="430" width="190" height="50" rx="10" fill="#1e2a3a" stroke="#4f8ef7" stroke-width="1.5"/>
  <rect x="120" y="430" width="5" height="50" rx="3" fill="url(#blueGrad)"/>
  <text x="143" y="451" font-size="10" fill="#4f8ef7" font-weight="600">L6</text>
  <text x="222" y="451" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">编排层</text>
  <text x="222" y="468" text-anchor="middle" font-size="10" fill="#8899aa">拆分 Pipeline，并行调度子 Agent</text>

  <!-- Arrow L6→L7 -->
  <line x1="215" y1="480" x2="215" y2="500" stroke="#4f8ef7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- L7 -->
  <rect x="120" y="498" width="190" height="50" rx="10" fill="#1e2a3a" stroke="#4f8ef7" stroke-width="1.5"/>
  <rect x="120" y="498" width="5" height="50" rx="3" fill="url(#blueGrad)"/>
  <text x="143" y="519" font-size="10" fill="#4f8ef7" font-weight="600">L7</text>
  <text x="222" y="519" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">执行层</text>
  <text x="222" y="536" text-anchor="middle" font-size="10" fill="#8899aa">搜索 / 读写文件 / 调用工具</text>

  <!-- Arrow L7 → output -->
  <line x1="215" y1="548" x2="215" y2="570" stroke="#ff6b35" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <rect x="145" y="570" width="140" height="34" rx="8" fill="#1a1a2e" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="215" y="591" text-anchor="middle" font-size="12" fill="#ff9f1c" font-weight="600">📱 推送微信 / UI</text>

  <!-- ── USER MODEL (right column) ── -->
  <rect x="470" y="270" width="200" height="148" rx="12" fill="#1a1a2e" stroke="#7b5ea7" stroke-width="1.5"/>
  <rect x="470" y="270" width="200" height="5" rx="3" fill="url(#blueGrad)"/>
  <text x="570" y="296" text-anchor="middle" font-size="13" fill="#a78bfa" font-weight="700">L4 · 用户模型</text>
  <!-- Fixed layer -->
  <rect x="488" y="308" width="164" height="28" rx="6" fill="#2a1f3d"/>
  <text x="498" y="326" font-size="10" fill="#a78bfa">固化层</text>
  <text x="648" y="326" text-anchor="end" font-size="10" fill="#666">稳定偏好 / 长期验证</text>
  <!-- Active layer -->
  <rect x="488" y="342" width="164" height="28" rx="6" fill="#2a1f3d"/>
  <text x="498" y="360" font-size="10" fill="#a78bfa">活跃层</text>
  <text x="648" y="360" text-anchor="end" font-size="10" fill="#666">近期高频 / 临时偏好</text>
  <!-- Archive layer -->
  <rect x="488" y="376" width="164" height="28" rx="6" fill="#1a1524"/>
  <text x="498" y="394" font-size="10" fill="#555">归档层</text>
  <text x="648" y="394" text-anchor="end" font-size="10" fill="#444">失效旧偏好</text>

  <!-- Arrow L4 → L3 (inject) -->
  <path d="M 470 330 C 420 330 380 310 310 319" stroke="#7b5ea7" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow)"/>
  <text x="388" y="320" font-size="9" fill="#7b5ea7">注入习惯</text>

  <!-- ── FEEDBACK LOOP (right) ── -->
  <!-- L8 -->
  <rect x="470" y="460" width="200" height="50" rx="10" fill="#1e2a3a" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="470" y="460" width="5" height="50" rx="3" fill="#f59e0b"/>
  <text x="493" y="481" font-size="10" fill="#f59e0b" font-weight="600">L8</text>
  <text x="572" y="481" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">复盘层</text>
  <text x="572" y="498" text-anchor="middle" font-size="10" fill="#8899aa">收集用户反馈（8 状态矩阵）</text>

  <!-- Arrow L8→L9 -->
  <line x1="570" y1="510" x2="570" y2="530" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- L9 — LLM badge -->
  <rect x="470" y="528" width="200" height="50" rx="10" fill="#1f2d1f" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
  <rect x="470" y="528" width="5" height="50" rx="3" fill="#22c55e"/>
  <text x="493" y="549" font-size="10" fill="#22c55e" font-weight="600">L9</text>
  <text x="572" y="549" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">蒸馏层 ✦ LLM</text>
  <text x="572" y="566" text-anchor="middle" font-size="10" fill="#8899aa">热蒸馏 + 冷蒸馏 → 更新画像</text>

  <!-- Arrow L9 → L4 (update model) -->
  <path d="M 670 553 C 740 553 740 390 670 390" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow)"/>
  <text x="748" y="480" text-anchor="middle" font-size="9" fill="#22c55e" transform="rotate(-90,748,480)">更新画像</text>

  <!-- Arrow from L7 output → L8 (feedback) -->
  <path d="M 310 583 C 400 583 440 485 470 485" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="392" y="573" font-size="9" fill="#f59e0b">用户反馈</text>

  <!-- ── LEGEND ── -->
  <rect x="560" y="88" width="260" height="148" rx="10" fill="#12121f" stroke="#333" stroke-width="1"/>
  <text x="690" y="110" text-anchor="middle" font-size="12" fill="#888" font-weight="600">图例</text>
  <!-- LLM -->
  <rect x="578" y="120" width="12" height="12" rx="2" fill="#22c55e"/>
  <text x="598" y="131" font-size="11" fill="#ccc">调用 LLM（仅 L3 + L9）</text>
  <!-- Rule engine -->
  <rect x="578" y="142" width="12" height="12" rx="2" fill="#4f8ef7"/>
  <text x="598" y="153" font-size="11" fill="#ccc">规则引擎（无 LLM 调用）</text>
  <!-- User model -->
  <rect x="578" y="164" width="12" height="12" rx="2" fill="#7b5ea7"/>
  <text x="598" y="175" font-size="11" fill="#ccc">用户模型（读写）</text>
  <!-- Feedback -->
  <rect x="578" y="186" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="598" y="197" font-size="11" fill="#ccc">反馈 / 蒸馏闭环</text>
  <!-- Cost note -->
  <rect x="576" y="210" width="224" height="18" rx="4" fill="#1a2010"/>
  <text x="688" y="223" text-anchor="middle" font-size="10" fill="#22c55e">平均每条任务 &lt; 2 次 LLM 调用</text>
</svg>
